<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music | South of the Sun</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050505;
    --white: #f5f0eb;
    --red: #931007;
    --line: rgba(245, 240, 235, 0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    color: var(--white);
    background: radial-gradient(circle at top, rgba(147, 16, 7, 0.24), transparent 35%), radial-gradient(circle at bottom right, rgba(147, 16, 7, 0.14), transparent 30%), var(--black);
    font-family: 'Crimson Text', serif;
  }
  .shell { max-width: 1380px; margin: 0 auto; padding: 40px 24px 90px; }
  .topbar { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; margin-bottom: 42px; }
  .eyebrow { font-family: 'Bebas Neue', sans-serif; letter-spacing: 6px; color: var(--red); font-size: 14px; margin-bottom: 12px; }
  h1, h2, h3 { font-family: 'Cinzel', serif; }
  h1 { font-size: clamp(40px, 7vw, 82px); line-height: 0.92; max-width: 780px; }
  .lead { margin-top: 18px; max-width: 760px; color: rgba(245, 240, 235, 0.72); font-size: 20px; line-height: 1.7; }
  .button { display: inline-flex; align-items: center; justify-content: center; padding: 14px 26px; border: 1px solid rgba(245, 240, 235, 0.24); color: var(--white); text-decoration: none; font-family: 'Bebas Neue', sans-serif; letter-spacing: 4px; background: transparent; cursor: pointer; transition: all 0.3s; font-size: 14px; }
  .button:hover { color: var(--red); border-color: var(--red); }
  .content-layout { display: grid; grid-template-columns: minmax(0, 1fr) 460px; gap: 28px; align-items: start; }
  .is-hidden { display: none !important; }

  /* ── STATUS BAR — music-shell style ── */
  .status-bar {
    background: linear-gradient(180deg, rgba(26, 26, 26, 0.92), rgba(10, 10, 10, 1));
    border: 1px solid rgba(245, 240, 235, 0.08);
    padding: 28px 24px;
    position: sticky;
    top: 24px;
  }
  .status-grid {
    display: grid;
    grid-template-columns: minmax(200px, 240px) 1fr;
    gap: 24px;
    align-items: start;
  }
  .player-left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .player-right {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Vinyl in status bar */
  .detail-cover-wrap {
    display: flex;
    justify-content: center;
  }
  .detail-vinyl {
    width: 180px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    position: relative;
    display: grid;
    place-items: center;
    background:
      repeating-radial-gradient(circle at center, rgba(0,0,0,0.28) 0 2px, rgba(130,0,0,0.22) 2px 8px, rgba(30,0,0,0.55) 8px 10px),
      radial-gradient(circle at 28% 24%, rgba(255,255,255,0.16), transparent 18%),
      radial-gradient(circle at center, #bc1818 0%, #8f1111 52%, #280404 100%);
    box-shadow: inset 0 0 34px rgba(0,0,0,0.45);
    flex-shrink: 0;
  }
  .detail-vinyl.is-spinning { animation: spin 4s linear infinite; }
  .detail-vinyl::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #f0e8dc;
    box-shadow: 0 0 0 5px rgba(0,0,0,0.45);
  }
  .detail-label {
    width: 42%; aspect-ratio: 1 / 1;
    border-radius: 50%; overflow: hidden;
    position: relative; z-index: 1;
    border: 4px solid rgba(0,0,0,0.42);
  }
  .detail-label img { width: 100%; height: 100%; object-fit: cover; }

  /* Player controls */
  .player-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .player-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    background: var(--red);
    border: 1px solid var(--red);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .player-button:hover {
    background: transparent;
    color: var(--red);
  }

  /* Audio / video shells */
  .audio-wrap { display: flex; flex-direction: column; gap: 10px; }
  .player-status {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    color: var(--red);
    font-size: 13px;
  }
  audio { width: 100%; accent-color: var(--red); }
  .video-shell {
    aspect-ratio: 16 / 9;
    border: 1px solid var(--line);
    background: #090909;
    display: none;
  }
  .video-shell iframe, .video-shell video { width: 100%; height: 100%; border: 0; }
  .spotify-shell {
    border: 1px solid var(--line);
    background: #090909;
    display: none;
    min-height: 352px;
  }
  .spotify-shell iframe { width: 100%; height: 352px; border: 0; }

  /* Right info column */
  .detail-meta {
    color: rgba(245, 240, 235, 0.5);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-size: 13px;
  }
  .detail-copy h2 {
    font-size: clamp(22px, 2.6vw, 30px);
    line-height: 1.1;
    margin: 4px 0 8px;
  }
  .detail-description {
    color: rgba(245, 240, 235, 0.72);
    font-size: 17px;
    line-height: 1.6;
  }
  .status-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }

  /* ── VINYL GRID ── */
  .vinyl-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 28px 22px; }
  .record-card {
    background: linear-gradient(180deg, rgba(22,22,22,0.95), rgba(8,8,8,1));
    border: 1px solid var(--line);
    padding: 22px 18px 20px;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .record-card:hover, .record-card.is-active {
    transform: translateY(-6px);
    border-color: rgba(147, 16, 7, 0.55);
    box-shadow: 0 24px 52px rgba(147, 16, 7, 0.12);
  }
  .mini-vinyl-wrap { display: grid; place-items: center; margin-bottom: 18px; }
  .mini-vinyl {
    width: 180px; aspect-ratio: 1 / 1;
    border-radius: 50%; position: relative;
    display: grid; place-items: center;
    border: none; padding: 0;
    background:
      repeating-radial-gradient(circle at center, rgba(0,0,0,0.28) 0 2px, rgba(130,0,0,0.22) 2px 8px, rgba(30,0,0,0.55) 8px 10px),
      radial-gradient(circle at 28% 24%, rgba(255,255,255,0.16), transparent 18%),
      radial-gradient(circle at center, #bc1818 0%, #8f1111 52%, #280404 100%);
    box-shadow: inset 0 0 34px rgba(0,0,0,0.45);
    cursor: pointer;
  }
  .mini-vinyl::after {
    content: ''; position: absolute;
    width: 10px; height: 10px; border-radius: 50%;
    background: #f0e8dc; box-shadow: 0 0 0 5px rgba(0,0,0,0.45);
  }
  .mini-vinyl.is-spinning { animation: spin 4s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .mini-label {
    width: 44%; aspect-ratio: 1 / 1;
    border-radius: 50%; overflow: hidden;
    position: relative; z-index: 1;
    border: 3px solid rgba(0,0,0,0.42);
  }
  .mini-label img { width: 100%; height: 100%; object-fit: cover; }
  .record-card small { display: block; color: var(--red); font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; font-size: 13px; margin-bottom: 8px; }
  .record-card h3 { font-size: 25px; margin-bottom: 10px; }
  .record-card p { color: rgba(245, 240, 235, 0.67); line-height: 1.6; font-size: 17px; min-height: 82px; }
  .record-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
  .empty-state { padding: 24px; border: 1px dashed rgba(245, 240, 235, 0.18); color: rgba(245, 240, 235, 0.7); background: rgba(18,18,18,0.6); font-size: 18px; }

  @media (max-width: 1100px) {
    .content-layout { grid-template-columns: 1fr; }
    .status-bar { position: static; }
    .status-grid { grid-template-columns: 200px minmax(0, 1fr); align-items: start; }
    .vinyl-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 640px) {
    .topbar { flex-direction: column; }
    .vinyl-grid { grid-template-columns: 1fr; }
    .status-grid { grid-template-columns: 1fr; }
    .record-actions, .status-links, .player-controls { width: 100%; }
    .button, .player-button { width: 100%; }
    .detail-vinyl { width: 150px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <p class="eyebrow">Discography</p>
      <h1>Choose a vinyl and start that song.</h1>
      <p class="lead">All records are lined up side by side. Click the vinyl you want, and only that selected song will start playing.</p>
    </div>
    <a class="button" href="index.html">Back to Home</a>
  </div>

  <div class="content-layout">
    <section class="vinyl-grid" id="vinyl-grid"></section>

    <section class="status-bar is-hidden" id="status-bar">
      <div class="status-grid">

        <!-- LEFT: vinyl + controls + audio -->
        <div class="player-left">
          <div class="detail-cover-wrap">
            <div class="detail-vinyl" id="detail-vinyl">
              <div class="detail-label">
                <img id="detail-image" src="IMG_7255.JPG" alt="Selected album art">
              </div>
            </div>
          </div>

          <div class="player-controls">
            <button class="player-button" type="button" id="play-detail-btn">&#9654; Play</button>
            <a class="button" id="spotify-button" href="#" target="_blank" rel="noopener">Spotify</a>
            <a class="button" id="youtube-button" href="#" target="_blank" rel="noopener">YouTube</a>
          </div>

          <div class="audio-wrap">
            <span class="player-status" id="now-playing-label">Selected Record</span>
            <audio id="audio-player" controls preload="auto"></audio>
            <div class="video-shell" id="video-shell"></div>
            <div class="spotify-shell" id="spotify-shell"></div>
          </div>
        </div>

        <!-- RIGHT: info -->
        <div class="player-right detail-copy">
          <div class="detail-meta" id="detail-meta"></div>
          <h2 id="detail-title">Music Details</h2>
          <p class="detail-description" id="now-playing-text">Click any vinyl to start the selected song.</p>
        </div>

      </div>
    </section>
  </div>
</div>

<script src="site-data.js"></script>
<script>
  let tracks = [];
  const vinylGrid        = document.getElementById('vinyl-grid');
  const statusBar        = document.getElementById('status-bar');
  const audioPlayer      = document.getElementById('audio-player');
  const spotifyButton    = document.getElementById('spotify-button');
  const youtubeButton    = document.getElementById('youtube-button');
  const nowPlayingLabel  = document.getElementById('now-playing-label');
  const nowPlayingText   = document.getElementById('now-playing-text');
  const detailMeta       = document.getElementById('detail-meta');
  const detailTitle      = document.getElementById('detail-title');
  const videoShell       = document.getElementById('video-shell');
  const spotifyShell     = document.getElementById('spotify-shell');
  const detailVinyl      = document.getElementById('detail-vinyl');
  const detailImage      = document.getElementById('detail-image');
  const playDetailBtn    = document.getElementById('play-detail-btn');
  let currentTrack = null;

  function isMp4Url(url) {
    if (!url) return false;
    var u = String(url).toLowerCase();
    return u.indexOf('data:video/mp4') !== -1 ||
      u.indexOf('video/mp4') !== -1 ||
      /(\.mp4)(\?|#|$)/i.test(u);
  }

  function getYouTubeEmbedUrl(url) {
    if (!url) return '';
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace('www.', '');
      let videoId = '';
      if (host === 'youtu.be') {
        videoId = parsed.pathname.split('/').filter(Boolean)[0] || '';
      } else if (host.includes('youtube.com')) {
        if (parsed.pathname.startsWith('/watch')) {
          videoId = parsed.searchParams.get('v') || '';
        } else if (parsed.pathname.startsWith('/shorts/')) {
          videoId = parsed.pathname.split('/')[2] || '';
        } else if (parsed.pathname.startsWith('/embed/')) {
          videoId = parsed.pathname.split('/')[2] || '';
        } else {
          videoId = parsed.searchParams.get('v') || '';
        }
      }
      return videoId ? 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0' : '';
    } catch (e) { return ''; }
  }

  function getSpotifyEmbedUrl(url) {
    if (!url) return '';
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace('www.', '');
      if (!host.includes('spotify.com')) return '';
      const parts = parsed.pathname.split('/').filter(Boolean);
      if (parts[0] === 'intl' && parts.length >= 3) {
        return 'https://open.spotify.com/embed/' + parts.slice(2).join('/');
      }
      if (parts.length >= 2) {
        return 'https://open.spotify.com/embed/' + parts.join('/');
      }
    } catch (e) {}
    return '';
  }

  function setActiveTrack(trackId, spinning) {
    document.querySelectorAll('.record-card').forEach((card) => {
      const isActive = card.dataset.trackId === trackId;
      card.classList.toggle('is-active', isActive);
      const vinyl = card.querySelector('.mini-vinyl');
      if (vinyl) vinyl.classList.toggle('is-spinning', isActive && spinning);
    });
    detailVinyl.classList.toggle('is-spinning', Boolean(trackId) && spinning);
  }

  function stopVisualPlayback() {
    if (currentTrack) setActiveTrack(currentTrack.id, false);
  }

  function openExternalPlayback(url) {
    if (!url) return false;
    window.open(url, '_blank', 'noopener,noreferrer');
    return true;
  }

  function doPlay(track) {
    audioPlayer.pause();
    audioPlayer.removeAttribute('src');
    audioPlayer.load();
    videoShell.innerHTML = '';
    videoShell.style.display = 'none';
    spotifyShell.innerHTML = '';
    spotifyShell.style.display = 'none';
    setActiveTrack(track.id, false);

    // 1. Spotify embed
    const spotifyEmbedUrl = getSpotifyEmbedUrl(track.spotifyUrl);
    if (spotifyEmbedUrl) {
      spotifyShell.innerHTML = '<iframe src="' + spotifyEmbedUrl + '" loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>';
      spotifyShell.style.display = 'block';
      nowPlayingLabel.textContent = 'Spotify Player';
      nowPlayingText.textContent = 'Spotify player opened for ' + track.title + '.';
      setActiveTrack(track.id, true);
      return;
    }

    // 2. Audio file (mp4 or regular)
    if (track.audioUrl) {
      if (isMp4Url(track.audioUrl)) {
        audioPlayer.style.display = 'none';
        videoShell.innerHTML = '<video id="record-video" preload="none" playsinline style="width:100%;height:100%;background:#000;"></video>';
        videoShell.style.display = 'block';
        const v = document.getElementById('record-video');
        v.src = track.audioUrl;
        v.currentTime = 0;
        v.onended = stopVisualPlayback;
        v.onpause = stopVisualPlayback;
        v.play().then(() => {
          nowPlayingLabel.textContent = 'Now Playing';
          setActiveTrack(track.id, true);
        }).catch(() => {
          nowPlayingLabel.textContent = 'Ready To Play';
        });
        return;
      }
      audioPlayer.style.display = 'block';
      audioPlayer.src = track.audioUrl;
      audioPlayer.currentTime = 0;
      audioPlayer.load();
      audioPlayer.play().then(() => {
        nowPlayingLabel.textContent = 'Now Playing';
        setActiveTrack(track.id, true);
      }).catch(() => {
        nowPlayingLabel.textContent = 'Ready To Play';
      });
      return;
    }

    // 3. YouTube embed
    const embedUrl = getYouTubeEmbedUrl(track.youtubeUrl);
    if (embedUrl && location.protocol !== 'file:') {
      videoShell.innerHTML = '<iframe src="' + embedUrl + '" title="' + track.title + ' video player" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
      videoShell.style.display = 'block';
      nowPlayingLabel.textContent = 'Now Playing';
      setActiveTrack(track.id, true);
    } else if (embedUrl && location.protocol === 'file:') {
      openExternalPlayback(track.youtubeUrl);
      nowPlayingLabel.textContent = 'Opened In YouTube';
      nowPlayingText.textContent = 'Inline playback is blocked in local file mode, so the track was opened on YouTube.';
      setActiveTrack(track.id, true);
    } else if (track.youtubeUrl) {
      openExternalPlayback(track.youtubeUrl);
      nowPlayingLabel.textContent = 'Opened In YouTube';
      nowPlayingText.textContent = 'This YouTube link could not be embedded, so it was opened directly on YouTube.';
      setActiveTrack(track.id, true);
    } else {
      nowPlayingLabel.textContent = 'Playback Notice';
      nowPlayingText.textContent = 'This record has no playable file yet.';
    }
  }

  function playTrack(track) {
    currentTrack = track;
    statusBar.classList.remove('is-hidden');
    detailImage.src = track.coverUrl || 'IMG_7255.JPG';
    detailMeta.textContent = [track.year || 'NEW', track.releaseType || 'Release'].join(' · ');
    detailTitle.textContent = track.title;
    nowPlayingText.textContent = track.description || 'No description available yet.';
    nowPlayingLabel.textContent = 'Selected Record';
    spotifyButton.href = track.spotifyUrl || '#';
    youtubeButton.href = track.youtubeUrl || '#';

    // Reset shells without playing yet
    audioPlayer.pause();
    audioPlayer.removeAttribute('src');
    audioPlayer.load();
    audioPlayer.style.display = 'block';
    videoShell.innerHTML = '';
    videoShell.style.display = 'none';
    spotifyShell.innerHTML = '';
    spotifyShell.style.display = 'none';
    setActiveTrack(track.id, false);
  }

  // Play button in status bar
  playDetailBtn.addEventListener('click', () => {
    if (currentTrack) doPlay(currentTrack);
  });

  function renderLibrary() {
    if (!tracks.length) {
      vinylGrid.innerHTML = '<div class="empty-state">No tracks have been added yet. The admin can add music from the admin portal.</div>';
      return;
    }
    vinylGrid.innerHTML = tracks.map((track) => {
      return '<article class="record-card" data-track-id="' + track.id + '">' +
        '<div class="mini-vinyl-wrap">' +
        '<button class="mini-vinyl" type="button" data-play-track="' + track.id + '" aria-label="Play ' + track.title + '">' +
        '<div class="mini-label"><img src="' + (track.coverUrl || 'IMG_7365.JPG') + '" alt="' + track.title + ' album art"></div>' +
        '</button></div>' +
        '<small>' + ((track.year || 'NEW') + ' · ' + (track.releaseType || 'Release')) + '</small>' +
        '<h3>' + track.title + '</h3>' +
        '<p>' + (track.description || 'No description available yet.') + '</p>' +
        '<div class="record-actions">' +
        '<button class="button" type="button" data-play-track="' + track.id + '">Play This</button>' +
        '</div>' +
        '</article>';
    }).join('');

    vinylGrid.querySelectorAll('[data-play-track]').forEach((button) => {
      button.addEventListener('click', () => {
        const track = tracks.find((item) => item.id === button.dataset.playTrack);
        if (track) playTrack(track);
      });
    });
  }

  audioPlayer.addEventListener('play', () => {
    if (currentTrack) setActiveTrack(currentTrack.id, true);
  });
  audioPlayer.addEventListener('pause', stopVisualPlayback);
  audioPlayer.addEventListener('ended', stopVisualPlayback);

  async function initMusicPage() {
    const remote = await window.SOTS_STORAGE.refreshContent();
    tracks = Array.isArray(remote.tracks) ? remote.tracks : window.SOTS_STORAGE.getTracks();
    renderLibrary();
  }

  initMusicPage();
</script>
</body>
</html>
